<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captr - Screen Capture, Text Recognition & Translation</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #000;
            min-height: 100vh;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 80px 24px 48px;
        }

        h1 {
            font-size: clamp(40px, 6vw, 64px);
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1.1;
            margin-bottom: 16px;
            color: #000;
        }

        .subtitle {
            font-size: 18px;
            color: #666;
            max-width: 480px;
            line-height: 1.5;
            margin-bottom: 48px;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn-download:hover {
            opacity: 0.8;
        }

        .btn-download svg {
            width: 20px;
            height: 20px;
        }

        .buttons {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-github {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 16px 40px;
            background: #fff;
            color: #000;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn-github:hover {
            opacity: 0.7;
        }

        .btn-github svg {
            width: 20px;
            height: 20px;
        }

        .meta {
            margin-top: 20px;
            font-size: 13px;
            color: #999;
        }

        .app-icon {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            margin-bottom: 32px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 32px;
            max-width: 960px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        .feature {
            text-align: center;
            padding: 32px 24px;
            border-radius: 16px;
            background: #f9f9f9;
        }

        .feature-icon {
            font-size: 32px;
            margin-bottom: 16px;
        }

        .feature h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .feature p {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        .divider {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            border: none;
            border-top: 1px solid #eee;
        }

        .shortcuts {
            max-width: 560px;
            margin: 0 auto;
            padding: 48px 24px 80px;
            text-align: center;
        }

        .shortcuts h2 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 32px;
        }

        .shortcut-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        .shortcut-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .shortcut-item span {
            font-size: 14px;
            color: #333;
        }

        .shortcut-key {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 13px;
            color: #666;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 4px 10px;
        }

        footer {
            text-align: center;
            padding: 32px 24px;
            font-size: 13px;
            color: #999;
            border-top: 1px solid #eee;
        }

        footer a {
            color: #666;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <img src="icon.png" alt="Captr" class="app-icon">
        <h1>Capture anything.</h1>
        <p class="subtitle">Screenshots, screen recording, text recognition, and instant translation — all from one lightweight Mac app.</p>
        <div class="buttons">
            <a href="Captr.dmg" download class="btn-download">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download for Mac
            </a>
            <a href="https://github.com/simonrramor/captr" class="btn-github">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                GitHub
            </a>
        </div>
        <p class="meta">macOS 15+ &middot; Apple Silicon &amp; Intel &middot; Free &amp; Open Source</p>
    </section>



    <footer>
        <p>Built by <a href="https://github.com/simonrramor">Simon Amor</a> &middot; <a href="https://github.com/simonrramor/captr">Source on GitHub</a></p>
    </footer>
</body>
</html>
