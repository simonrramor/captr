<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshot - Simple Screen Capture</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 24px;
        }

        h1 {
            font-size: clamp(40px, 6vw, 64px);
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1.1;
            margin-bottom: 48px;
            color: #000;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn-download:hover {
            opacity: 0.8;
        }

        .btn-download svg {
            width: 20px;
            height: 20px;
        }

        .meta {
            margin-top: 20px;
            font-size: 13px;
            color: #999;
        }

        .app-icon {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            margin-bottom: 32px;
        }
    </style>
</head>
<body>
    <section class="hero">
        <img src="icon.png" alt="Screenshot" class="app-icon">
        <h1>Simple screen capture.</h1>
        <a href="https://github.com/simonrramor/ScreenRecorder/releases/latest" class="btn-download">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download for Mac
        </a>
        <p class="meta">macOS 14+ &middot; Apple Silicon &amp; Intel &middot; Free &amp; Open Source</p>
    </section>
</body>
</html>
