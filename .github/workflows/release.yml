# Automated macOS release pipeline for Captr.
#
# Trigger: any push to main that touches Info.plist. The workflow reads the
# version from Info.plist, checks whether that tag already exists, and skips
# if so — making re-runs safe and idempotent.
#
# You can also trigger manually via the "Run workflow" button on the Actions
# tab (workflow_dispatch), which reads version from main HEAD.
#
# Release notes are taken from the body of the triggering commit:
#   git commit -m "Bump version to 1.2.5 (build 8)
#
#   - Feature A
#   - Feature B"
#
# Lines starting with "- " are rendered as <li>s in the appcast; other text
# is wrapped in <p>.
#
# What the workflow does:
#   1. Reads version from Info.plist; skips if tag v<version> exists
#   2. Generates Captr.xcodeproj via xcodegen
#   3. Imports the Developer ID Application cert
#   4. Archives + signs + exports Captr.app
#   5. Notarizes and staples the .app
#   6. Packages Captr.dmg with hdiutil, signs + notarizes + staples
#   7. Sparkle sign_update produces the EdDSA signature
#   8. Prepends a new <item> to appcast.xml
#   9. Commits appcast.xml + Captr.dmg to main, mirrors appcast to gh-pages
#  10. Creates a GitHub Release with the DMG (this also creates the tag)
#
# -----------------------------------------------------------------------------
# Required repository secrets (Settings → Secrets and variables → Actions):
#
#   DEVELOPER_ID_CERT_P12_BASE64
#     Base64 of your Developer ID Application .p12 export. To generate:
#       1. Xcode → Settings → Accounts → Manage Certificates → right-click the
#          "Developer ID Application" cert → Export… (set a password)
#       2. base64 -i DeveloperID.p12 | pbcopy
#
#   DEVELOPER_ID_CERT_PASSWORD
#     The password you set during the .p12 export above.
#
#   NOTARY_API_KEY_P8_BASE64
#     Base64 of an App Store Connect API key (.p8 file).
#
#   NOTARY_KEY_ID
#     The 10-character Key ID from App Store Connect.
#
#   NOTARY_ISSUER_ID
#     The UUID at the top of the Keys page in App Store Connect.
#
#   SPARKLE_PRIVATE_KEY
#     The EdDSA private key that pairs with SUPublicEDKey in Info.plist.
# -----------------------------------------------------------------------------

name: Release

on:
  push:
    branches: [main]
    paths: ['Info.plist']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 45

    env:
      SPARKLE_VERSION: "2.6.0"
      TEAM_ID: "D89WR7924X"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from Info.plist
        run: |
          set -euo pipefail
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Info.plist)
          BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" Info.plist)
          TAG="v$VERSION"
          echo "PLIST_VERSION=$VERSION" >> $GITHUB_ENV
          echo "PLIST_BUILD=$BUILD" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Building $VERSION (build $BUILD) → tag $TAG"

      - name: Check if release already exists
        run: |
          set -euo pipefail
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::notice::Tag $TAG already exists — skipping release."
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
          else
            echo "SKIP_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Extract release notes from commit body
        if: env.SKIP_RELEASE == 'false'
        run: |
          set -euo pipefail
          NOTES=$(git log -1 --format=%b "$GITHUB_SHA" | sed '/^[[:space:]]*$/d')
          if [ -z "$NOTES" ]; then
            NOTES="New release"
          fi
          {
            echo "RELEASE_NOTES<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> $GITHUB_ENV

      - name: Select latest stable Xcode
        if: env.SKIP_RELEASE == 'false'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        if: env.SKIP_RELEASE == 'false'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: env.SKIP_RELEASE == 'false'
        run: xcodegen generate

      - name: Import Developer ID certificate
        if: env.SKIP_RELEASE == 'false'
        env:
          CERT_B64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)

          echo "$CERT_B64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          OLD_KEYCHAINS=$(security list-keychains -d user | sed 's/"//g' | xargs)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $OLD_KEYCHAINS
          security set-key-partition-list -S "apple-tool:,apple:,codesign:" -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm -f "$CERT_PATH"

      - name: Archive
        if: env.SKIP_RELEASE == 'false'
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project Captr.xcodeproj \
            -scheme Captr \
            -configuration Release \
            -archivePath build/Captr.xcarchive \
            -destination 'generic/platform=macOS' \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export signed .app
        if: env.SKIP_RELEASE == 'false'
        run: |
          set -euo pipefail
          cat > build/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/Captr.xcarchive \
            -exportPath build/Export \
            -exportOptionsPlist build/exportOptions.plist

          codesign --verify --deep --strict --verbose=2 build/Export/Captr.app

      - name: Notarize and staple .app
        if: env.SKIP_RELEASE == 'false'
        env:
          NOTARY_API_KEY_B64: ${{ secrets.NOTARY_API_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$NOTARY_API_KEY_B64" | base64 --decode > "$KEY_PATH"

          APP_PATH="build/Export/Captr.app"
          ZIP_PATH="build/Captr-notarize.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

          xcrun notarytool submit "$ZIP_PATH" \
            --key "$KEY_PATH" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

          rm -f "$ZIP_PATH"

      - name: Build DMG
        if: env.SKIP_RELEASE == 'false'
        run: |
          set -euo pipefail
          STAGING="$RUNNER_TEMP/dmg-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R build/Export/Captr.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          rm -f Captr.dmg
          hdiutil create \
            -volname "Captr" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            Captr.dmg

      - name: Sign and notarize DMG
        if: env.SKIP_RELEASE == 'false'
        env:
          NOTARY_API_KEY_B64: ${{ secrets.NOTARY_API_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          codesign --sign "Developer ID Application" --timestamp Captr.dmg
          codesign --verify --verbose Captr.dmg

          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$NOTARY_API_KEY_B64" | base64 --decode > "$KEY_PATH"

          xcrun notarytool submit Captr.dmg \
            --key "$KEY_PATH" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait

          xcrun stapler staple Captr.dmg
          xcrun stapler validate Captr.dmg

          rm -f "$KEY_PATH"

      - name: Sign DMG with Sparkle EdDSA key
        if: env.SKIP_RELEASE == 'false'
        id: sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          curl -sfL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar -xJ
          chmod +x bin/sign_update

          KEY_FILE="$RUNNER_TEMP/sparkle_priv"
          umask 077
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"

          SIG_OUTPUT=$(./bin/sign_update -f "$KEY_FILE" Captr.dmg)
          rm -f "$KEY_FILE"

          echo "sign_update output: $SIG_OUTPUT"

          SIGNATURE=$(echo "$SIG_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          LENGTH=$(echo "$SIG_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')

          if [ -z "$SIGNATURE" ] || [ -z "$LENGTH" ]; then
            echo "::error::Failed to parse sign_update output"
            exit 1
          fi

          echo "signature=$SIGNATURE" >> $GITHUB_OUTPUT
          echo "length=$LENGTH" >> $GITHUB_OUTPUT

      - name: Update appcast.xml
        if: env.SKIP_RELEASE == 'false'
        env:
          SIGNATURE: ${{ steps.sparkle.outputs.signature }}
          LENGTH: ${{ steps.sparkle.outputs.length }}
        run: |
          set -euo pipefail

          PUBDATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")

          export VERSION="$PLIST_VERSION"
          export BUILD="$PLIST_BUILD"
          export TAG
          export SIGNATURE
          export LENGTH
          export PUBDATE
          export RELEASE_NOTES

          python3 <<'PY'
          import os, re

          version = os.environ["VERSION"]
          build = os.environ["BUILD"]
          tag = os.environ["TAG"]
          signature = os.environ["SIGNATURE"]
          length = os.environ["LENGTH"]
          pubdate = os.environ["PUBDATE"]
          notes = os.environ["RELEASE_NOTES"].strip()

          # Format notes as a <ul> if every non-empty line starts with "- "
          # (the convention used by previous releases); otherwise inline as <p>.
          lines = [ln.strip() for ln in notes.splitlines() if ln.strip()]
          if lines and all(ln.startswith(("- ", "* ")) for ln in lines):
              items = "\n".join(f"                    <li>{ln[2:].strip()}</li>" for ln in lines)
              notes_html = f"\n                <ul>\n{items}\n                </ul>\n            "
          else:
              notes_html = f"\n                <p>{notes}</p>\n            "

          repo = os.environ["GITHUB_REPOSITORY"]
          dmg_url = f"https://github.com/{repo}/releases/download/{tag}/Captr.dmg"

          new_item = (
              "        <item>\n"
              f"            <title>Version {version}</title>\n"
              f"            <description><![CDATA[{notes_html}]]></description>\n"
              f"            <pubDate>{pubdate}</pubDate>\n"
              f'            <enclosure url="{dmg_url}"\n'
              f'                       sparkle:version="{build}"\n'
              f'                       sparkle:shortVersionString="{version}"\n'
              f'                       sparkle:edSignature="{signature}"\n'
              f'                       length="{length}"\n'
              f'                       type="application/octet-stream"/>\n'
              "            <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>\n"
              "        </item>\n"
          )

          with open("appcast.xml", "r", encoding="utf-8") as f:
              xml = f.read()

          replaced, count = re.subn(
              r"([ \t]*)<item>",
              lambda m: new_item + m.group(0),
              xml,
              count=1,
          )
          if count == 0:
              raise SystemExit("Could not find <item> anchor in appcast.xml")

          with open("appcast.xml", "w", encoding="utf-8") as f:
              f.write(replaced)
          PY

      - name: Commit refreshed appcast.xml and DMG to main
        if: env.SKIP_RELEASE == 'false'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          ARTIFACTS_DIR="$RUNNER_TEMP/release-artifacts"
          mkdir -p "$ARTIFACTS_DIR"
          cp Captr.dmg "$ARTIFACTS_DIR/"
          cp appcast.xml "$ARTIFACTS_DIR/"

          git reset --hard HEAD

          git fetch origin main
          git checkout main
          git pull --rebase origin main

          cp "$ARTIFACTS_DIR/Captr.dmg" Captr.dmg
          cp "$ARTIFACTS_DIR/appcast.xml" appcast.xml

          git add Captr.dmg appcast.xml
          git commit -m "Release v${PLIST_VERSION} (build ${PLIST_BUILD})"

          for delay in 2 4 8 16; do
            if git push origin main; then
              break
            fi
            echo "Push failed, retrying in ${delay}s…"
            sleep "$delay"
          done

      - name: Publish appcast.xml to gh-pages
        if: env.SKIP_RELEASE == 'false'
        run: |
          set -euo pipefail
          ARTIFACTS_DIR="$RUNNER_TEMP/release-artifacts"

          git fetch origin gh-pages
          git checkout gh-pages
          git pull --rebase origin gh-pages

          cp "$ARTIFACTS_DIR/appcast.xml" appcast.xml

          git add appcast.xml
          git commit -m "Publish v${PLIST_VERSION} to appcast"

          for delay in 2 4 8 16; do
            if git push origin gh-pages; then
              break
            fi
            echo "Push failed, retrying in ${delay}s…"
            sleep "$delay"
          done

      - name: Restore DMG for upload
        if: env.SKIP_RELEASE == 'false'
        run: |
          # After the gh-pages step we're on a different branch. The
          # working-directory Captr.dmg is NOT the one we built — it's
          # whatever gh-pages (or the branch switch) left behind. Copy
          # the actual artifact back so the release upload gets the right
          # file with the matching Sparkle signature.
          cp "$RUNNER_TEMP/release-artifacts/Captr.dmg" Captr.dmg

      - name: Create tag and GitHub Release
        if: env.SKIP_RELEASE == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          target_commitish: main
          name: Captr ${{ env.PLIST_VERSION }}
          body: ${{ env.RELEASE_NOTES }}
          files: Captr.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
