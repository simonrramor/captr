# Runs on every PR and every push to main. Generates the Xcode project
# via xcodegen, builds Debug (no signing), and runs the CaptrTests suite.
# Gives a green/red signal before merging without touching any of the
# release secrets.
#
# macos-15 is required because the project's MACOSX_DEPLOYMENT_TARGET is 15.0,
# so the test host can only run on macOS 15+.

name: Build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Debug
        run: |
          set -euo pipefail
          xcodebuild build \
            -project Captr.xcodeproj \
            -scheme Captr \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          set -euo pipefail
          xcodebuild test \
            -project Captr.xcodeproj \
            -scheme Captr \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
