name: Captr
options:
  bundleIdPrefix: com.captr
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

schemes:
  Captr:
    build:
      targets:
        Captr: all
        CaptrTests: [test]
    test:
      targets:
        - CaptrTests

targets:
  Captr:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "Resources/Assets.xcassets/AppIcon.appiconset"
          - "*.xcodeproj"
          - ".git"
          - ".gitignore"
          - ".claude"
          - "project.yml"
          - "DerivedData"
          - "build"
          - "CaptrTests"
    resources:
      - path: Resources/Assets.xcassets
      - path: Resources/ios_stream.py
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.captr.app
        PRODUCT_NAME: Captr
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: Captr.entitlements
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: PBU727Q3RR
        SWIFT_OBJC_BRIDGING_HEADER: Captr-Bridging-Header.h
    entitlements:
      path: Captr.entitlements

  CaptrTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CaptrTests
    dependencies:
      - target: Captr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.captr.tests
        PRODUCT_NAME: CaptrTests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: PBU727Q3RR
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Captr.app/Contents/MacOS/Captr"
        BUNDLE_LOADER: "$(TEST_HOST)"
